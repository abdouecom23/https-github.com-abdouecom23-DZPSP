name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Check Formatting
      run: npm run format -- --check

    - name: Run Linter / Typecheck
      run: npm run lint

    - name: Run Build
      run: npm run build

    - name: Run Tests
      run: npm run test
